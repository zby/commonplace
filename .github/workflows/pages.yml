name: Deploy KB to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade mkdocs mkdocs-redirects pyyaml

      - name: Rebuild directory indexes and tag listings
        run: |
          python scripts/generate_notes_index.py kb/notes
          python scripts/generate_notes_index.py kb/sources
          python scripts/sync_generated_index.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: mkdocs build --clean --site-dir site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
