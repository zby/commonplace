$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "./note.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
          - index_source
        properties:
          type:
            const: kb/types/dir-index.md
          index_source:
            const: directory
        additionalProperties: true
