$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "./note.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
        properties:
          type:
            const: kb/types/instruction.md
          name:
            type: string
            minLength: 1
        additionalProperties: true
