$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "../../types/note-base.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        properties:
          type:
            const: kb/articles/types/article.md
          source_notes:
            type: array
            items:
              type: string
              pattern: '^kb/.+\.md$'
        additionalProperties: true
