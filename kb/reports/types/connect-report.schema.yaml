$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "../../types/note.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
          - source
          - source_has_frontmatter
          - date
          - depth
        properties:
          type:
            const: kb/reports/types/connect-report.md
          source:
            type: string
            minLength: 1
          source_has_frontmatter:
            type: boolean
          date:
            type: string
            format: date
          depth:
            enum:
              - quick
              - standard
              - deep
        additionalProperties: true
      headings:
        type: array
        allOf:
          - contains:
              const: "## Discovery Trace"
          - contains:
              const: "## Connections Found"
          - contains:
              const: "## Bidirectional Candidates"
          - contains:
              const: "## Reverse-edge Candidates"
          - contains:
              const: "## Off-authorisation Candidates"
          - contains:
              const: "## Raw Text Candidates"
          - contains:
              const: "## Rejected Candidates"
          - contains:
              const: "## Index Membership"
          - contains:
              const: "## Synthesis Opportunities"
          - contains:
              const: "## Maintenance Observations"
          - contains:
              const: "## Flags"
