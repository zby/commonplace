$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "../../types/note.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
          - last-checked
        properties:
          type:
            const: kb/agent-memory-systems/types/agent-memory-system-review.md
          last-checked:
            type: string
            format: date
        additionalProperties: true
      headings:
        description: "Required review headings. Borrowable Ideas nests as a ### subsection under ## Comparison with Our System. ## Write-side placement is required in every review (it carries the **Write agency:** verdict; a ### Trace-derived learning sub-section is added only when trace-learning applies). ## Read-back placement carries the required **Read-back:** verdict and its full body only for a non-trivial push-activation path."
        type: array
        allOf:
          - contains:
              const: "## Core Ideas"
          - contains:
              const: "## Comparison with Our System"
          - contains:
              const: "## Write-side placement"
          - contains:
              const: "## Curiosity Pass"
          - contains:
              const: "## What to Watch"
  - properties:
      body:
        not:
          pattern: "\\*\\*Representational form:\\*\\*[^\\n]*`mixed`"
  # Strict write-side / read-side layout. No backcompat for the old layout.
  - properties:
      body:
        pattern: "\\*\\*Write agency:\\*\\*"
  - properties:
      body:
        not:
          pattern: "## Trace-derived learning placement"
  - properties:
      body:
        not:
          pattern: "\\*\\*Read-back timing:\\*\\*"
  - if:
      properties:
        frontmatter:
          required:
            - tags
          properties:
            tags:
              contains:
                const: trace-derived
    then:
      properties:
        body:
          pattern: "### Trace-derived learning"
  - if:
      properties:
        frontmatter:
          required:
            - tags
          properties:
            tags:
              contains:
                const: push-activation
    then:
      properties:
        body:
          pattern: "Read-back placement"
