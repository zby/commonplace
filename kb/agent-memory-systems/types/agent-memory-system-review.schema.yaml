$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "../../types/note.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
          - last-checked
        properties:
          type:
            const: kb/agent-memory-systems/types/agent-memory-system-review.md
          last-checked:
            type: string
            format: date
        additionalProperties: true
      headings:
        description: "Required review headings. ## Trace-derived learning placement and ## Read-back placement are optional, each used only when the review finds the corresponding qualifying mechanism (trace-derived learning / a non-trivial push-activation path)."
        type: array
        allOf:
          - contains:
              const: "## Core Ideas"
          - contains:
              const: "## Comparison with Our System"
          - contains:
              const: "## Borrowable Ideas"
          - contains:
              const: "## Curiosity Pass"
          - contains:
              const: "## What to Watch"
  - if:
      properties:
        frontmatter:
          required:
            - tags
          properties:
            tags:
              contains:
                const: trace-derived
    then:
      properties:
        body:
          pattern: "Trace-derived learning placement"
  - if:
      properties:
        frontmatter:
          required:
            - tags
          properties:
            tags:
              contains:
                const: push-activation
    then:
      properties:
        body:
          pattern: "Read-back placement"
