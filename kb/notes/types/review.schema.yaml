$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "../../types/note.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
        properties:
          type:
            const: review
        additionalProperties: true
      headings:
        type: array
        allOf:
          - contains:
              const: "## Findings"
anyOf:
  - properties:
      frontmatter:
        type: object
        required:
          - date
  - properties:
      frontmatter:
        type: object
        required:
          - last-checked
  - properties:
      body_dates:
        type: array
        minItems: 1
