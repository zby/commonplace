$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "./note.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
        properties:
          type:
            const: kb/types/instruction.md
        additionalProperties: true
  - if:
      properties:
        frontmatter:
          required:
            - gate_id
    then:
      properties:
        frontmatter:
          required:
            - gate_id
            - name
            - lens
            - watches
            - staleness
        headings:
          type: array
          allOf:
            - contains:
                const: "## Failure mode"
            - contains:
                const: "## Test"
