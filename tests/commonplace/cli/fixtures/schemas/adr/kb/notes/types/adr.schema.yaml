$schema: "https://json-schema.org/draft/2020-12/schema"
allOf:
  - $ref: "../../types/note-base.schema.yaml"
  - type: object
    properties:
      frontmatter:
        type: object
        required:
          - description
          - type
        properties:
          type:
            const: kb/notes/types/adr.md
          status:
            enum:
              - proposed
              - accepted
              - superseded
              - deprecated
        additionalProperties: true
      headings:
        type: array
        allOf:
          - contains:
              const: "## Context"
          - contains:
              const: "## Decision"
          - contains:
              const: "## Consequences"
