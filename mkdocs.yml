site_name: Commonplace
site_description: Commonplace knowledge base rendered as static HTML.
docs_dir: kb
exclude_docs: |
  reports/**
  work/review-revise-gated/baseline.md
  work/review-revise-gated/target.md
  work/review-revise-gated/gates/**
  work/review-revise-gated/run-08/**
theme:
  name: mkdocs
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/tablesort/5.3.0/tablesort.min.js
  - javascripts/tablesort-init.js
plugins:
  - search
  - redirects:
      redirect_maps:
        'agent-memory-systems/landscape.md': 'agent-memory-systems/README.md'
        'agent-memory-systems/related-systems-index.md': 'agent-memory-systems/README.md'
        'notes/a-good-agentic-kb-maximizes-contextual-competence-through-discoverable-composable-trustworthy-knowledge.md': 'notes/an-agentic-kb-maximizes-contextual-competence-through-discoverable-composable-trusted-knowledge.md'
        'notes/agent-memory-serves-contextual-competence-through-discoverable-composable-trusted-knowledge.md': 'notes/agent-memory-needs-discoverable-composable-trusted-knowledge-under-bounded-context.md'
        'notes/commonplace-architecture.md': 'reference/architecture.md'
        'notes/deploy-time-learning-the-missing-middle.md': 'notes/deploy-time-learning-is-the-missing-middle.md'
        'notes/document-classification.md': 'reference/available-types.md'
        'notes/epiplexity-eli5.md': 'work/information-measures/epiplexity-eli5.md'
        'notes/execution-traces-are-observational-byproducts-not-default-handoff-artifacts.md': 'notes/session-history-should-not-be-the-default-next-context.md'
        'notes/execution-traces-may-be-worth-storing-but-should-not-be-default-next-context.md': 'notes/session-history-should-not-be-the-default-next-context.md'
        'notes/llm-frameworks-should-expose-the-loop.md': 'notes/tool-loop-index.md'
        'notes/minimum-viable-vocabulary-is-the-set-of-names-that-maximally-reduces-extraction-cost-for-a-bounded-observer.md': 'notes/minimum-viable-vocabulary-is-the-naming-set-that-most-reduces-extraction-cost-for-a-bounded-observer.md'
        'notes/per-window-context-inefficiency-makes-tasks-infeasible.md': 'notes/feasibility-is-the-heaviest-forks-net-load.md'
        'notes/related-systems/related-systems-index.md': 'agent-memory-systems/README.md'
        'notes/reverse-compression-is-the-failure-mode-where-llm-output-expands-without-adding-information.md': 'notes/reverse-compression-is-when-llm-output-expands-without-adding-information.md'
        'notes/rlm-achieves-the-clean-scheduler-model-but-opts-out-of-accumulation.md': 'notes/rlm-has-the-model-write-ephemeral-orchestrators-over-sub-agents.md'
        'notes/trace-derived-learning-techniques-in-related-systems.md': 'agent-memory-systems/trace-derived-learning-techniques-in-related-systems.md'
        'notes/traversal-improves-the-graph.md': 'notes/traversal-improvements-should-be-deferred-via-logging-to-avoid-mid-task-context-switching.md'
        'notes/underspecification-and-indeterminism-make-programming-practices-harder-in-distinct-ways-when-applied-to-prompting.md': 'notes/underspecification-and-indeterminism-complicate-programming-for-prompts-in-distinct-ways.md'
# nav is generated dynamically by src/commonplace/docs/mkdocs_hooks.py:on_config
# from kb/<collection>/README.md files. To add a collection to the nav, create
# its README.md.
hooks:
  - src/commonplace/docs/mkdocs_hooks.py
  - mkdocs_site_assets.py
validation:
  nav:
    omitted_files: ignore
