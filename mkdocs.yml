site_name: Commonplace
site_description: Commonplace knowledge base rendered as static HTML.
docs_dir: kb
theme:
  name: mkdocs
nav:
  - Home: index.md
  - Concepts:
      - KB Design: notes/kb-design-index.md
      - Learning Theory: notes/learning-theory-index.md
      - Document System: notes/document-system-index.md
      - Computational Model: notes/computational-model-index.md
      - Linking Methodology: notes/links-index.md
  - Browse:
      - Tags: notes/tags-index.md
      - Notes Directory: notes/index.md
      - Related Systems: notes/related-systems/related-systems-index.md
      - Sources Directory: sources/index.md
  - How To:
      - Writing Guide: instructions/WRITING.md
      - KB Maintenance: notes/kb-maintenance-index.md
      - Agents Notes: log.md
  - Recent Changes: https://github.com/zby/commonplace/commits/main/
  - GitHub: https://github.com/zby/commonplace
hooks:
  - scripts/mkdocs_hooks.py
validation:
  nav:
    omitted_files: ignore
