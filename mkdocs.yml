      - Sources Directory: sources/index.md
      - Workshops: work/README.md
  - How To:
      - "Notes conventions": notes/COLLECTION.md
      - "Reference conventions": reference/COLLECTION.md
      - "Instructions conventions": instructions/COLLECTION.md
      - KB Maintenance: notes/kb-maintenance-index.md
      - Agents Notes: log.md
  - Recent Changes: https://github.com/zby/commonplace/commits/main/
  - GitHub: https://github.com/zby/commonplace
hooks:
  - src/commonplace/docs/mkdocs_hooks.py
validation:
