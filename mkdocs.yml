          - Architecture: reference/architecture.md
          - Type System: reference/type-system.md
          - ADR 002: reference/adr/002-inline-global-types-in-writing-guide.md
          - ADR 003: reference/adr/003-connect-skill-discovery-strategy.md
          - ADR 004: reference/adr/004-replace-areas-with-tags.md
          - ADR 005: reference/adr/005-quality-check-placement.md
          - ADR 006: reference/adr/006-two-tree-installation-layout.md
          - ADR 007: reference/adr/007-reports-directory-for-generated-snapshots.md
          - ADR 008: reference/adr/008-stdlib-only-core-scripts.md
          - ADR 009: reference/adr/009-link-relationship-semantics.md
