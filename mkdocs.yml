        'notes/deploy-time-learning-the-missing-middle.md': 'notes/deploy-time-learning-is-the-missing-middle.md'
        'notes/document-classification.md': 'reference/type-system.md'
        'notes/epiplexity-eli5.md': 'work/information-measures/epiplexity-eli5.md'
        'notes/execution-traces-are-observational-byproducts-not-default-handoff-artifacts.md': 'notes/session-history-should-not-be-the-default-next-context.md'
        'notes/execution-traces-may-be-worth-storing-but-should-not-be-default-next-context.md': 'notes/session-history-should-not-be-the-default-next-context.md'
        'notes/llm-frameworks-should-expose-the-loop.md': 'notes/tool-loop-index.md'
