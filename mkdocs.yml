          - ADR 013: reference/adr/013-skills-first-delivery-with-core-local-type-split.md
          - ADR 014: reference/adr/014-scripts-as-python-package-one-tree-model.md
          - ADR 015: reference/adr/015-standardize-authored-type-definitions-on-json-schema.md
          - ADR 016: reference/adr/016-custom-types-use-template-instruction-pairs.md
